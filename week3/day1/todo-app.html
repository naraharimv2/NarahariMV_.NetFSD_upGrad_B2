<!DOCTYPE html>
<html>
<head>
    <title>To-Do List App</title>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        .completed {
            text-decoration: line-through;
            color: gray;
        }

        li {
            margin-bottom: 8px;
        }

        button {
            margin-left: 5px;
        }
    </style>
</head>
<body>

    <h2>To-Do List</h2>

    <input type="text" id="taskInput" placeholder="Enter task">
    <button id="addTask">Add</button>

    <h4>Total Tasks: <span id="totalCount">0</span></h4>
    <h4>Completed Tasks: <span id="completedCount">0</span></h4>

    <ul id="taskList"></ul>

<script>
$(document).ready(function(){

    let total = 0;
    let completed = 0;

    // Add Task
    $("#addTask").click(function(){

        let taskText = $("#taskInput").val().trim();

        if(taskText === "") {
            alert("Please enter a task!");
            return;
        }

        let taskItem = `
            <li>
                <span class="taskText">${taskText}</span>
                <button class="completeBtn">Complete</button>
                <button class="deleteBtn">Delete</button>
            </li>
        `;

        $("#taskList").append(taskItem);

        total++;
        $("#totalCount").text(total);

        $("#taskInput").val("");

    });

    // Mark Complete (Event Delegation)
    $("#taskList").on("click", ".completeBtn", function(){

        let task = $(this).siblings(".taskText");

        if(!task.hasClass("completed")){
            task.addClass("completed");
            completed++;
        } else {
            task.removeClass("completed");
            completed--;
        }

        $("#completedCount").text(completed);

    });

    // Delete Task
    $("#taskList").on("click", ".deleteBtn", function(){

        let task = $(this).siblings(".taskText");

        if(task.hasClass("completed")){
            completed--;
        }

        total--;
        $("#totalCount").text(total);
        $("#completedCount").text(completed);

        $(this).parent().remove();

    });

});
</script>

</body>
</html>
